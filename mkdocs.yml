site_name: Lanby Docs
site_url: https://docs.lanby.dev
site_description: Guides and reference for Lanby — monitoring, relays, alerts, and the notification API.
repo_url: https://console.lanby.dev
repo_name: Open Console

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - navigation.expand
    - toc.follow
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Concepts:
    - Relay agents: relays.md
  - Monitoring:
    - Monitor types: monitors.md
    - Keepalive heartbeats: keepalive.md
  - Alerts & Delivery:
    - Destinations: destinations.md
    - Publish API: notifications.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

extra:
  generator: false
